name: Release Build

on:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build Linux and publish release
    runs-on: ubuntu-24.04   # Ubuntu 24.04 ships GTK 4.14 which satisfies features = ["v4_10"]

    permissions:
      contents: write       # needed to create/update the rolling release

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Read version from Cargo.toml
      id: version
      run: |
        VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install GTK4 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-4-dev \
          build-essential \
          pkg-config \
          binutils

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-musl

    - name: Install musl toolchain
      run: sudo apt-get install -y musl-tools

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Cache build target
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-release-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-release-target-

    - name: Build release binaries
      run: |
        cargo build --release --bin vimcode
        cargo build --release --bin vcd --no-default-features --target x86_64-unknown-linux-musl

    - name: Strip binaries
      run: |
        strip target/release/vimcode
        strip target/x86_64-unknown-linux-musl/release/vcd

    # ── .deb package ──────────────────────────────────────────────────────────
    - name: Install cargo-deb
      run: cargo install cargo-deb --locked

    - name: Build .deb package
      run: cargo deb --no-build   # binary already built above; just package it

    - name: Locate .deb file
      run: |
        DEB=$(ls target/debian/vimcode_*.deb | head -1)
        echo "DEB_PATH=$DEB" >> $GITHUB_ENV
        echo "DEB_NAME=$(basename $DEB)" >> $GITHUB_ENV

    # ── Rename raw binaries ────────────────────────────────────────────────────
    - name: Prepare raw binary artifacts
      run: |
        cp target/release/vimcode vimcode-linux-x86_64
        cp target/x86_64-unknown-linux-musl/release/vcd vcd-linux-x86_64
        echo "BIN_NAME=vimcode-linux-x86_64" >> $GITHUB_ENV
        echo "TUI_BIN_NAME=vcd-linux-x86_64" >> $GITHUB_ENV

    # ── Publish to GitHub Releases ────────────────────────────────────────────
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: "VimCode v${{ env.VERSION }}"
        body: |
          ## Installation

          ### Linux

          **Option A — .deb package (recommended for Ubuntu/Debian)**
          ```
          sudo dpkg -i ${{ env.DEB_NAME }}
          sudo apt -f install    # installs any missing GTK4 runtime libraries
          ```

          **Option B — raw binary (GUI)**
          ```
          # First install runtime dependencies:
          sudo apt install libgtk-4-1 libglib2.0-0 libpango-1.0-0 libcairo2
          # Then run:
          chmod +x vimcode-linux-x86_64
          ./vimcode-linux-x86_64
          ```

          **Option C — TUI-only binary (no GTK required, statically linked)**
          ```
          chmod +x vcd-linux-x86_64
          ./vcd-linux-x86_64
          ```
          Statically linked with musl — runs on any Linux (Ubuntu 20.04+, CentOS 7+, Alpine, etc.). No GTK4 or other libraries needed.

          **Option D — Flatpak** (see attached `vimcode.flatpak` asset)
          ```
          flatpak install vimcode.flatpak
          flatpak run io.github.jdonaghy.VimCode
          ```

          > GUI binary requires GTK 4.10+. Ubuntu 22.04 ships GTK 4.6 which is too old; Ubuntu 24.04+ recommended.

          ### macOS (Apple Silicon)

          **Option A — Homebrew (recommended)**
          ```
          brew tap JDonaghy/vimcode
          brew install vimcode    # GTK4 GUI + TUI
          # or
          brew install vcd        # TUI only (no GTK4 dependency)
          ```

          **Option B — direct download**
          Download `vimcode-macos-arm64.tar.gz` (GUI) or `vcd-macos-arm64.tar.gz` (TUI only), extract, and run:
          ```
          tar xzf vcd-macos-arm64.tar.gz
          ./vcd
          ```
          > GUI binary requires GTK4 via Homebrew: `brew install gtk4`
        prerelease: false
        make_latest: true
        files: |
          ${{ env.DEB_PATH }}
          ${{ env.BIN_NAME }}
          ${{ env.TUI_BIN_NAME }}

  # ── macOS Apple Silicon ──────────────────────────────────────────────────────
  build-macos:
    name: Build macOS ARM64 binaries
    runs-on: macos-latest     # Apple Silicon (M1+)
    needs: build-and-release  # wait for release to be created

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install GTK4 and build dependencies
      run: brew install gtk4 pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: macos-arm64-cargo-

    - name: Cache build target
      uses: actions/cache@v4
      with:
        path: target
        key: macos-arm64-release-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: macos-arm64-release-target-

    - name: Build release binaries
      run: |
        cargo build --release --bin vimcode
        cargo build --release --bin vcd --no-default-features

    - name: Strip and ad-hoc codesign
      run: |
        strip target/release/vimcode
        strip target/release/vcd
        codesign --sign - --force target/release/vimcode
        codesign --sign - --force target/release/vcd

    - name: Package as tarballs
      run: |
        tar czf vimcode-macos-arm64.tar.gz -C target/release vimcode
        tar czf vcd-macos-arm64.tar.gz -C target/release vcd

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.build-and-release.outputs.version }}
        files: |
          vimcode-macos-arm64.tar.gz
          vcd-macos-arm64.tar.gz

  # ── Flatpak ────────────────────────────────────────────────────────────────
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Flatpak and flatpak-builder
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak SDK and runtime
      run: |
        flatpak install --user -y --noninteractive flathub org.gnome.Platform//48 org.gnome.Sdk//48
        flatpak install --user -y --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08

    - name: Read version from Cargo.toml
      run: |
        VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build Flatpak
      run: |
        flatpak-builder --user --repo=repo --force-clean --disable-rofiles-fuse builddir flatpak/io.github.jdonaghy.VimCode.yml
        flatpak build-bundle --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo repo vimcode.flatpak io.github.jdonaghy.VimCode master

    - name: Upload Flatpak to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        files: vimcode.flatpak

  # ── Update Homebrew tap ──────────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [build-and-release, build-macos]

    steps:
    - name: Trigger tap formula update
      env:
        GH_TOKEN: ${{ secrets.TAP_UPDATE_TOKEN }}
      run: |
        gh workflow run update.yml \
          -R JDonaghy/homebrew-vimcode \
          -f version=${{ needs.build-and-release.outputs.version }}
