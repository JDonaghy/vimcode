name: Release Build

on:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-24.04   # Ubuntu 24.04 ships GTK 4.14 which satisfies features = ["v4_10"]

    permissions:
      contents: write       # needed to create/update the rolling release

    steps:
    - uses: actions/checkout@v4

    - name: Read version from Cargo.toml
      run: |
        VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Install GTK4 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-4-dev \
          build-essential \
          pkg-config \
          binutils

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Cache build target
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-release-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-release-target-

    - name: Build release binary
      run: cargo build --release

    - name: Strip binary
      run: strip target/release/vimcode

    # ── .deb package ──────────────────────────────────────────────────────────
    - name: Install cargo-deb
      run: cargo install cargo-deb --locked

    - name: Build .deb package
      run: cargo deb --no-build   # binary already built above; just package it

    - name: Locate .deb file
      run: |
        DEB=$(ls target/debian/vimcode_*.deb | head -1)
        echo "DEB_PATH=$DEB" >> $GITHUB_ENV
        echo "DEB_NAME=$(basename $DEB)" >> $GITHUB_ENV

    # ── Rename raw binary ─────────────────────────────────────────────────────
    - name: Prepare raw binary artifact
      run: |
        cp target/release/vimcode vimcode-linux-x86_64
        echo "BIN_NAME=vimcode-linux-x86_64" >> $GITHUB_ENV

    # ── Publish to GitHub Releases ────────────────────────────────────────────
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: "VimCode v${{ env.VERSION }}"
        body: |
          ## Installation (Linux)

          **Option A — .deb package (recommended for Ubuntu/Debian)**
          ```
          sudo dpkg -i ${{ env.DEB_NAME }}
          sudo apt -f install    # installs any missing GTK4 runtime libraries
          ```

          **Option B — raw binary**
          ```
          # First install runtime dependencies:
          sudo apt install libgtk-4-1 libglib2.0-0 libpango-1.0-0 libcairo2
          # Then run:
          chmod +x vimcode-linux-x86_64
          ./vimcode-linux-x86_64
          ```

          **Option C — Flatpak** (see attached `vimcode.flatpak` asset)
          ```
          flatpak install vimcode.flatpak
          flatpak run io.github.jdonaghy.VimCode
          ```

          > Requires GTK 4.10+. Ubuntu 22.04 ships GTK 4.6 which is too old; Ubuntu 24.04+ recommended.
        prerelease: false
        make_latest: true
        files: |
          ${{ env.DEB_PATH }}
          ${{ env.BIN_NAME }}

  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Flatpak and flatpak-builder
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

    - name: Read version from Cargo.toml
      run: |
        VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build Flatpak
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        manifest-path: flatpak/io.github.jdonaghy.VimCode.yml
        bundle: vimcode.flatpak
        run-tests: false
        cache-key: flatpak-builder-${{ hashFiles('**/Cargo.lock') }}

    - name: Upload Flatpak to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        files: vimcode.flatpak
