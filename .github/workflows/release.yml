name: Release Build

on:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-24.04   # Ubuntu 24.04 ships GTK 4.14 which satisfies features = ["v4_10"]

    permissions:
      contents: write       # needed to create/update the rolling release

    steps:
    - uses: actions/checkout@v4

    - name: Install GTK4 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-4-dev \
          build-essential \
          pkg-config \
          binutils

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Cache build target
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-release-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-release-target-

    - name: Build release binary
      run: cargo build --release

    - name: Strip binary
      run: strip target/release/vimcode

    # ── .deb package ──────────────────────────────────────────────────────────
    - name: Install cargo-deb
      run: cargo install cargo-deb --locked

    - name: Build .deb package
      run: cargo deb --no-build   # binary already built above; just package it

    - name: Locate .deb file
      run: |
        DEB=$(ls target/debian/vimcode_*.deb | head -1)
        echo "DEB_PATH=$DEB" >> $GITHUB_ENV
        echo "DEB_NAME=$(basename $DEB)" >> $GITHUB_ENV

    # ── Rename raw binary ─────────────────────────────────────────────────────
    - name: Prepare raw binary artifact
      run: |
        cp target/release/vimcode vimcode-linux-x86_64
        echo "BIN_NAME=vimcode-linux-x86_64" >> $GITHUB_ENV

    # ── Publish to GitHub Releases ────────────────────────────────────────────
    # This creates/updates a rolling "latest" release on every main push.
    # The release is public — anyone can download the assets without logging in.
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest build (main)"
        body: |
          Automated build from the latest commit on `main`.

          ## Installation (Ubuntu 24.04+)

          **Option A — .deb package (recommended)**
          ```
          sudo dpkg -i ${{ env.DEB_NAME }}
          sudo apt -f install    # installs any missing GTK4 runtime libraries
          ```

          **Option B — raw binary**
          ```
          # First install runtime dependencies:
          sudo apt install libgtk-4-1 libglib2.0-0 libpango-1.0-0 libcairo2
          # Then run:
          chmod +x vimcode-linux-x86_64
          ./vimcode-linux-x86_64
          ```

          > Requires Ubuntu 24.04 or later (GTK 4.10+).
        prerelease: true
        make_latest: false         # don't overwrite a real tagged release's "latest" badge
        files: |
          ${{ env.DEB_PATH }}
          ${{ env.BIN_NAME }}
