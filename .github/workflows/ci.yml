name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-24.04   # GTK 4.14 — satisfies features = ["v4_10"] in Cargo.toml

    steps:
    - uses: actions/checkout@v4

    - name: Install GTK4 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-4-dev \
          build-essential \
          pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

  build-macos:
    name: Build (macOS ARM64)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install GTK4 and build dependencies
      run: brew install gtk4 pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: macos-arm64-cargo-

    - name: Build GUI binary
      run: cargo build --bin vimcode

    - name: Build TUI binary
      run: cargo build --bin vcd --no-default-features

    - name: Run tests
      run: cargo test

  build-windows:
    name: Build (Windows TUI)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: windows-cargo-

    - name: Build TUI binary (no GTK)
      run: cargo build --bin vcd --no-default-features

    - name: Run tests (library only, no GTK)
      run: cargo test --lib --no-default-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04   # GTK 4.14 — satisfies features = ["v4_10"] in Cargo.toml

    steps:
    - uses: actions/checkout@v4

    - name: Install GTK4 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-4-dev \
          build-essential \
          pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Generate coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: lcov.info
        fail_ci_if_error: false
