name = "csharp"
display_name = "C# Language Support"
description = "LSP, debugger, and tooling for C# (.NET)"
version = "1.0.0"
file_extensions = [".cs", ".csproj", ".sln"]
language_ids = ["csharp"]

[lsp]
binary = "csharp-ls"
install = "dotnet tool install -g csharp-ls"

[dap]
adapter = "netcoredbg"

scripts = []
