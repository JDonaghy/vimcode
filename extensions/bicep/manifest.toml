name = "bicep"
display_name = "Bicep Language Support"
description = "LSP for Azure Bicep infrastructure-as-code files"
version = "1.0.0"
file_extensions = [".bicep", ".bicepparam"]
language_ids = ["bicep"]
workspace_markers = ["bicepconfig.json", "main.bicep"]

[lsp]
binary = "bicep-langserver"
install = "dotnet tool install -g bicep-langserver"
fallback_binaries = ["Bicep.LangServer"]
args = ["--stdio"]

scripts = []
